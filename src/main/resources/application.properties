spring.application.name=focustella-api
spring.config.import=optional:file:./application-local.properties

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/focustella}
spring.datasource.username=${DB_USERNAME:focustella}
spring.datasource.password=${DB_PASSWORD:focustella}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:change-this-secret-key-for-local-development-please-1234567890}
app.jwt.access-token-expiration-seconds=${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:2592000}

apple.team-id=${APPLE_TEAM_ID:}
apple.key-id=${APPLE_KEY_ID:}
apple.private-key-p8=${APPLE_PRIVATE_KEY_P8:}
apple.live-activity-topic=${APPLE_LIVE_ACTIVITY_TOPIC:com.focustella.ios.push-type.liveactivity}
apple.apns-env=${APPLE_APNS_ENV:SANDBOX}
